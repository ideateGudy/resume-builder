<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="shortcut icon" href="img/graphs.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/fontawesome.css" />
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <header
      class="navbar sticky-top bg-dark flex-md-nowrap p-0 shadow"
      data-bs-theme="dark"
    >
      <a
        class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6 text-white"
        href="index.html"
        ><img src="img/graphs.png" alt="" width="35px" />RESUME</a
      >
      <ul class="navbar-nav flex-row d-md-none">
        <li class="nav-item text-nowrap">
          <button
            class="nav-link px-3 text-white bg-dark"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSearch"
            aria-controls="navbarSearch"
            aria-expanded="false"
            aria-label="Toggle search"
          >
            <i class="fas fa-search fa-1x"></i>
          </button>
        </li>
        <li class="nav-item text-nowrap">
          <button
            class="nav-link px-3 text-white"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarMenu"
            aria-controls="sidebarMenu"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <i class="fas fa-bars fa-1x"></i>
          </button>
        </li>
      </ul>

      <div id="navbarSearch" class="navbar-search w-100 collapse">
        <input
          class="form-control w-100 rounded-0 border-0"
          type="text"
          placeholder="Search"
          aria-label="Search"
        />
      </div>
    </header>

    <div class="container-fluid">
      <div class="row h-95vh">
        <div
          class="sidebar border border-right col-md-3 col-lg-2 p-0 bg-body-tertiary"
        >
          <div
            class="offcanvas-md offcanvas-end bg-body-tertiary"
            tabindex="-1"
            id="sidebarMenu"
            aria-labelledby="sidebarMenuLabel"
          >
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="sidebarMenuLabel">
                <img src="img/graphs.png" alt="" width="40px" />RESUME
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"
                data-bs-target="#sidebarMenu"
                aria-label="Close"
              ></button>
            </div>
            <div
              class="offcanvas-body d-md-flex flex-column p-0 pt-lg-3 overflow-y-auto"
            >
              <ul class="nav flex-column">
                <li class="nav-item">
                  <a
                    class="nav-link d-flex align-items-center gap-2"
                    aria-current="page"
                    href="dashboard.html"
                  >
                    <svg class="bi"><use xlink:href="#house-fill" /></svg>
                    Dashboard
                  </a>
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link d-flex align-items-center gap-2"
                    href="templates.html"
                  >
                    <svg class="bi"><use xlink:href="#file-earmark" /></svg>
                    Templates
                  </a>
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link d-flex align-items-center gap-2"
                    href="my-resume.html"
                  >
                    <svg class="bi"><use xlink:href="#cart" /></svg>
                    My Resumes
                  </a>
                </li>
              </ul>
              <hr class="my-3" />

              <ul class="nav flex-column mb-auto">
                <li class="nav-item">
                  <a
                    class="nav-link text-secondary d-flex align-items-center gap-2 active"
                    href="profile.html"
                  >
                    <svg class="bi">
                      <use xlink:href="#gear-wide-connected" />
                    </svg>
                    Profile
                  </a>
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link d-flex align-items-center gap-2"
                    href="login.html"
                  >
                    <svg class="bi"><use xlink:href="#door-closed" /></svg>
                    Sign out
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <!-- Contents -->
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5 bg-light h-100">

          <form action="">

          <div class="d-flex align-items-center gap-3">
            <div class="form-floating mb-3 profile-page">
              <input
                type="text"
                class="form-control"
                id="floatingInput"
                placeholder="First Name"
              />
              <label for="floatingInput">First Name</label>
            </div>
            <div class="form-floating mb-3 profile-page">
              <input
                type="text"
                class="form-control"
                id="floatingInput"
                placeholder="First Name"
              />
              <label for="floatingInput">First Name</label>
            </div>
            
          </div>

          <div class="d-flex gap-3">
            <div class="form-floating profile-page ">
              <input
                type="text"
                class="form-control my-3"
                id="floatingInput"
                placeholder="Username"
              />
              <label for="floatingInput">Username</label>
            </div>
            <div class="form-floating profile-page ">
              <input
                type="email"
                class="form-control my-3"
                id="floatingInput"
                placeholder="Email"
              />
              <label for="floatingInput">Email address</label>
            </div>
            
           
          </div>

         <div class="d-flex gap-3">
          <div class="form-floating profile-page">
            <input
              type="password"
              class="form-control"
              id="floatingPassword"
              placeholder="Password"
            />
            <label for="floatingPassword">Password</label>
          </div>
          <div class="form-floating profile-page">
            <input
              type="password"
              class="form-control"
              id="floatingPassword"
              placeholder="ConfirmPassword"
            />
            <label for="floatingPassword">Confirm Password</label>
          </div>
          
         </div>

          <a href="personal-data.html"
            ><button
              class="btn btn-secondary text-light py-2 mt-4"
              type="button"
            >
              Save changes
            </button></a
          >
          </form>

        </main>

          <!-- <canvas
            class="my-4 w-100"
            id="myChart"
            width="900"
            height="380"
          ></canvas> -->
        </main>
      </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
